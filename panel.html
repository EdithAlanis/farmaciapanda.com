<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pedidos | Farmacia Panda</title><link rel="stylesheet" href="estilos.css"><style>body{padding:25px}.panel{max-width:1200px;margin:auto}.login,.orders{background:white;padding:24px;border-radius:18px;border:1px solid #efdbe5}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:15px 0}.order{border:1px solid #ead5e0;border-radius:14px;padding:18px;margin:12px 0}.order-head{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.order table{width:100%;border-collapse:collapse;margin-top:12px}.order td,.order th{padding:7px;border-bottom:1px solid #eee;text-align:left}.badge{padding:5px 9px;border-radius:99px;background:#fff0f7;color:#bd1d64;font-weight:800}.hidden{display:none}</style></head><body><div class="panel"><a href="index.html">← Volver a la tienda</a><h1>Pedidos de Farmacia Panda</h1><section id="login" class="login"><label>Clave de acceso<input id="pin" type="password" placeholder="Clave"></label><button id="enter" class="primary">Entrar</button><p id="msg"></p></section><section id="orders" class="orders hidden"><div class="toolbar"><input id="q" placeholder="Buscar folio, cliente o teléfono"><button id="reload" class="secondary">Actualizar</button><button id="export" class="secondary">Exportar CSV</button></div><div id="list"></div></section></div><script src="config.js"></script><script src="panel.js"></script></body></html>
